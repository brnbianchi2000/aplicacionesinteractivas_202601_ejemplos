<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rick and Morty — paso 2</title>
  <style>
    #lista li {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 0.35rem 0;
    }
    #lista img {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <h1>Personajes</h1>
  <ul id="lista"></ul>
  <p id="mensaje"></p>
  <script>
    const demo = {
      name: "Rick Sanchez",
      status: "Alive",
      image: "https://rickandmortyapi.com/api/character/avatar/1.jpeg"
    };

    const crearItem = (p) => {
      const li = document.createElement("li");
      const img = document.createElement("img");
      img.src = p.image;
      img.alt = p.name;
      img.loading = "lazy";
      const span = document.createElement("span");
      span.textContent = `${p.name} — ${p.status}`;
      li.append(img, span);
      return li;
    };

    const ul = document.getElementById("lista");
    const msg = document.getElementById("mensaje");
    msg.textContent = "Cargando...";

    setTimeout(() => {
      ul.replaceChildren(crearItem(demo));
      msg.textContent = "";
    }, 5500);

    console.log("sigue procesando")
  </script>
</body>
</html>
